name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn -B clean verify

    - name: Run Core Coverage Report
      run: mvn -B jacoco:report -pl load-shedder-core

    - name: Run Simulator Example
      run: mvn exec:java -Dexec.mainClass="io.github.shivam61.loadshedder.examples.BasicExample" -pl load-shedder-examples
